name: Refresh Irradiation

on:
  schedule:
    - cron: '15,45 3-19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with: { python-version: '3.11' }
      - run: pip install requests
      - run: python refresh_irradiation.py
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add sites/*/data/*.json
          git diff --quiet && git diff --staged --quiet && exit 0
          git commit -m "Refresh irradiation - $(date +'%Y-%m-%d %H:%M UTC')"
          git pull --no-rebase -X ours && git push
